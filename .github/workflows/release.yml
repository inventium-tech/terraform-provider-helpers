name: Release

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-dry-run:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
      - run: npm install conventional-changelog-conventionalcommits
      - name: Semantic Release (dry-run)
        run: npx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semantic-release:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.detect_release.outputs.released }}
      tag: ${{ steps.detect_release.outputs.tag }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
      - run: npm install conventional-changelog-conventionalcommits
      - name: Capture tags on HEAD before release
        run: git tag --points-at HEAD --list 'v*' | sort > /tmp/head-tags-before.txt
      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect published release tag
        id: detect_release
        shell: bash
        run: |
          git tag --points-at HEAD --list 'v*' | sort > /tmp/head-tags-after.txt
          new_tag="$(comm -13 /tmp/head-tags-before.txt /tmp/head-tags-after.txt | tail -n 1)"

          if [[ -n "$new_tag" ]]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
            echo "Release created for tag: $new_tag"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No release tag created in this run."
          fi

  goreleaser:
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    needs: semantic-release
    steps:
      - name: Git Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
